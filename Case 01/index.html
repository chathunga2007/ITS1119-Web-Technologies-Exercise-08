<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Case 01</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>JS Que</h1>
        <div class="content">
            <div class="walking-man">
                <img src="assets/Man.gif" alt="" class="man" id="man1">
                 <p id="a" class="man-1">A</p>
                <img src="assets/Man.gif" alt="" class="man" id="man2">
                 <p id="b" class="man-2">B</p>
                <img src="assets/Man.gif" alt="" class="man" id="man3">
                 <p id="c" class="man-3">C</p>
                <img src="assets/Man.gif" alt="" class="man" id="man4">
                 <p id="d" class="man-4">D</p>
                <img src="assets/Man.gif" alt="" class="man" id="man5">
                 <p id="e" class="man-5">E</p>
                <img src="assets/Man.gif" alt="" class="man" id="man6">
                 <p id="f" class="man-6">F</p>
            </div>
            <img src="assets/House.gif" alt="House" class="house">
        </div>
        <div class="controls">
            <button id="startBtn">Start</button>
            <button id="stopBtn" disabled>Stop</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
